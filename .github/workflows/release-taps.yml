name: Update taps

# Triggered automatically after the Release workflow completes successfully.
# Can also be triggered manually to push a formula/manifest for an existing
# release without re-tagging (e.g. after fixing the workflow itself).
#
# This job does NOT rebuild binaries. It downloads checksums.txt from the
# published GitHub release and generates the Homebrew cask and Scoop manifest
# directly from those checksums, then pushes them using a short-lived GitHub
# App token scoped only to lewta/homebrew-tap and lewta/scoop-bucket.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to push formula/manifest for (e.g. v0.10.0)"
        required: true

permissions:
  contents: read

jobs:
  update-taps:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      # Mint a short-lived token (expires in 1 h) scoped to only the two repos
      # that need to be updated. Requires a GitHub App installed on the lewta
      # account with Contents: Read and write on homebrew-tap and scoop-bucket.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homebrew-tap,scoop-bucket

      - name: Download checksums from release
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          curl -fsSL \
            "https://github.com/lewta/sendit/releases/download/${TAG}/checksums.txt" \
            -o /tmp/checksums.txt
          echo "TAG=${TAG}"         >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Push Homebrew cask
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          get_sha() { grep "$1" /tmp/checksums.txt | awk '{print $1}'; }

          DARWIN_AMD64=$(get_sha "sendit_${VERSION}_darwin_amd64.tar.gz")
          DARWIN_ARM64=$(get_sha "sendit_${VERSION}_darwin_arm64.tar.gz")
          LINUX_AMD64=$(get_sha  "sendit_${VERSION}_linux_amd64.tar.gz")
          LINUX_ARM64=$(get_sha  "sendit_${VERSION}_linux_arm64.tar.gz")

          cat > /tmp/sendit.rb << CASK
          # This file was generated by the release pipeline. DO NOT EDIT.
          cask "sendit" do
            name "sendit"
            desc "Traffic generation tool for HTTP, DNS, WebSocket, and headless-browser targets."
            homepage "https://github.com/lewta/sendit"
            version "${VERSION}"

            livecheck do
              skip "Auto-generated on release."
            end

            binary "sendit"
            bash_completion "completions/sendit.bash"
            zsh_completion "completions/sendit.zsh"
            fish_completion "completions/sendit.fish"

            on_macos do
              on_intel do
                url "https://github.com/lewta/sendit/releases/download/v#{version}/sendit_#{version}_darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64}"
              end
              on_arm do
                url "https://github.com/lewta/sendit/releases/download/v#{version}/sendit_#{version}_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/lewta/sendit/releases/download/v#{version}/sendit_#{version}_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64}"
              end
              on_arm do
                url "https://github.com/lewta/sendit/releases/download/v#{version}/sendit_#{version}_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              end
            end

            # TODO(v0.10.4): remove caveats once darwin binaries are notarized.
            caveats <<~EOS
              macOS Gatekeeper may block sendit because the binary is not yet
              notarized. If you see an "Apple could not verify" warning, run:
                sudo xattr -d com.apple.quarantine #{HOMEBREW_PREFIX}/bin/sendit
            EOS

            # No zap stanza required
          end
          CASK

          # Dedent: strip the leading spaces added by YAML block indentation
          sed -i 's/^          //' /tmp/sendit.rb

          FILE_SHA=$(gh api repos/lewta/homebrew-tap/contents/Casks/sendit.rb \
            --jq .sha 2>/dev/null || true)

          if [[ -n "$FILE_SHA" ]]; then
            gh api repos/lewta/homebrew-tap/contents/Casks/sendit.rb \
              --method PUT \
              -f "message=Brew cask update for sendit version ${TAG}" \
              -f "content=$(base64 -w0 /tmp/sendit.rb)" \
              -f "sha=${FILE_SHA}"
          else
            gh api repos/lewta/homebrew-tap/contents/Casks/sendit.rb \
              --method PUT \
              -f "message=Brew cask update for sendit version ${TAG}" \
              -f "content=$(base64 -w0 /tmp/sendit.rb)"
          fi

      - name: Push Scoop manifest
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          get_sha() { grep "$1" /tmp/checksums.txt | awk '{print $1}'; }

          WIN_AMD64=$(get_sha "sendit_${VERSION}_windows_amd64.zip")
          WIN_ARM64=$(get_sha "sendit_${VERSION}_windows_arm64.zip")

          cat > /tmp/sendit.json << JSON
          {
              "version": "${VERSION}",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/lewta/sendit/releases/download/${TAG}/sendit_${VERSION}_windows_amd64.zip",
                      "bin": [
                          "sendit.exe"
                      ],
                      "hash": "${WIN_AMD64}"
                  },
                  "arm64": {
                      "url": "https://github.com/lewta/sendit/releases/download/${TAG}/sendit_${VERSION}_windows_arm64.zip",
                      "bin": [
                          "sendit.exe"
                      ],
                      "hash": "${WIN_ARM64}"
                  }
              },
              "homepage": "https://github.com/lewta/sendit",
              "license": "MIT",
              "description": "Traffic generation tool for HTTP, DNS, WebSocket, and headless-browser targets."
          }
          JSON

          # Dedent: strip the leading spaces added by YAML block indentation
          sed -i 's/^          //' /tmp/sendit.json

          FILE_SHA=$(gh api repos/lewta/scoop-bucket/contents/sendit.json \
            --jq .sha 2>/dev/null || true)

          if [[ -n "$FILE_SHA" ]]; then
            gh api repos/lewta/scoop-bucket/contents/sendit.json \
              --method PUT \
              -f "message=Scoop update for sendit version ${TAG}" \
              -f "content=$(base64 -w0 /tmp/sendit.json)" \
              -f "sha=${FILE_SHA}"
          else
            gh api repos/lewta/scoop-bucket/contents/sendit.json \
              --method PUT \
              -f "message=Scoop update for sendit version ${TAG}" \
              -f "content=$(base64 -w0 /tmp/sendit.json)"
          fi

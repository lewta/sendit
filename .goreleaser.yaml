version: 2

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c 'go run ./cmd/sendit completion bash > completions/sendit.bash'
    - sh -c 'go run ./cmd/sendit completion zsh > completions/sendit.zsh'
    - sh -c 'go run ./cmd/sendit completion fish > completions/sendit.fish'

builds:
  - main: ./cmd/sendit
    binary: sendit
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      # darwin only ships amd64 and arm64
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: "386"
      # windows only ships amd64 and arm64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: "386"
      # freebsd only ships amd64
      - goos: freebsd
        goarch: arm64
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: "386"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.CommitDate}}

notarize:
  macos:
    - enabled: '{{ not .IsSnapshot }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.NOTARIZE_ISSUER_ID}}"
        key_id: "{{.Env.NOTARIZE_KEY_ID}}"
        key: "{{.Env.NOTARIZE_KEY}}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - completions/*

homebrew_casks:
  - name: sendit
    binaries:
      - sendit
    completions:
      bash: completions/sendit.bash
      zsh: completions/sendit.zsh
      fish: completions/sendit.fish
    repository:
      owner: lewta
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/lewta/sendit"
    description: "Traffic generation tool for HTTP, DNS, WebSocket, and headless-browser targets."
    license: "MIT"

nfpms:
  - package_name: sendit
    homepage: https://github.com/lewta/sendit
    maintainer: lewta <77890109+lewta@users.noreply.github.com>
    description: Traffic generation tool for HTTP, DNS, WebSocket, and headless-browser targets.
    license: MIT
    formats:
      - deb
      - rpm
      - archlinux
    contents:
      - src: completions/sendit.bash
        dst: /usr/share/bash-completion/completions/sendit
      # zsh: deb/rpm use vendor-completions; Arch uses site-functions
      - src: completions/sendit.zsh
        dst: /usr/share/zsh/vendor-completions/_sendit
        packager: deb
      - src: completions/sendit.zsh
        dst: /usr/share/zsh/vendor-completions/_sendit
        packager: rpm
      - src: completions/sendit.zsh
        dst: /usr/share/zsh/site-functions/_sendit
        packager: archlinux
      - src: completions/sendit.fish
        dst: /usr/share/fish/vendor_completions.d/sendit.fish

scoops:
  - repository:
      owner: lewta
      name: scoop-bucket
      token: "{{ .Env.GH_PAT }}"
    homepage: https://github.com/lewta/sendit
    description: Traffic generation tool for HTTP, DNS, WebSocket, and headless-browser targets.
    license: MIT

aurs:
  - name: sendit-bin
    homepage: "https://github.com/lewta/sendit"
    description: "Traffic generation tool for HTTP, DNS, WebSocket, and headless-browser targets."
    maintainers:
      - "lewta <77890109+lewta@users.noreply.github.com>"
    license: MIT
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/sendit-bin.git"
    package: |-
      install -Dm755 "./sendit" "${pkgdir}/usr/bin/sendit"
      install -Dm644 "./completions/sendit.bash" "${pkgdir}/usr/share/bash-completion/completions/sendit"
      install -Dm644 "./completions/sendit.zsh" "${pkgdir}/usr/share/zsh/site-functions/_sendit"
      install -Dm644 "./completions/sendit.fish" "${pkgdir}/usr/share/fish/vendor_completions.d/sendit.fish"

# SKIP_GH_RELEASE=true skips artifact uploads and keeps the existing release
# unchanged. Used by release-taps.yml: GoReleaser reads the existing release
# to compute download URLs for the homebrew cask and scoop manifest, then
# pushes those to the tap/bucket repos — without touching the release itself.
release:
  skip_upload: '{{ if eq .Env.SKIP_GH_RELEASE "true" }}true{{ else }}false{{ end }}'
  mode: keep-existing

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: "New features"
      regexp: '^feat'
      order: 0
    - title: "Bug fixes"
      regexp: '^fix'
      order: 1
    - title: "Security"
      regexp: '^(feat|fix|ci)\(security\)|^feat\(release\).*sign|^feat\(release\).*attest|govulncheck|gosec|scorecard|SLSA'
      order: 2
    - title: "CI / build / dependencies"
      regexp: '^(ci|build)'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          languages: go

      - uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13  # v4

      # Starting April 2026, CodeQL skips file coverage on PRs for performance.
      # File coverage is still computed on push-to-main analyses.
      # Accepted as default — Codecov covers per-file coverage on PRs.
      # To opt out: set CODEQL_ACTION_FILE_COVERAGE_ON_PRS=true in env.
      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v4

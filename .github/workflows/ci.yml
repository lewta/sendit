name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint manages its own cache

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: true

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: go test -race -tags integration -v -coverprofile=integration-coverage.txt -covermode=atomic ./...

      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: integration-coverage.txt
          flags: integration
          fail_ci_if_error: true

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7
        with:
          version: "~> v2"
          args: check
        env:
          SKIP_GH_RELEASE: "false"
          GH_PAT: "placeholder"
          AUR_SSH_KEY: "placeholder"
          MACOS_SIGN_P12: "placeholder"
          MACOS_SIGN_PASSWORD: "placeholder"
          NOTARIZE_KEY: "placeholder"
          NOTARIZE_KEY_ID: "placeholder"
          NOTARIZE_ISSUER_ID: "placeholder"

  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            goreleaser:
              - '.goreleaser.yaml'
              - '.github/workflows/release*.yml'

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        if: steps.changes.outputs.goreleaser == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7
        if: steps.changes.outputs.goreleaser == 'true'
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_GH_RELEASE: "false"
          GH_PAT: "placeholder"
          AUR_SSH_KEY: "placeholder"
          MACOS_SIGN_P12: "placeholder"
          MACOS_SIGN_PASSWORD: "placeholder"
          NOTARIZE_KEY: "placeholder"
          NOTARIZE_KEY_ID: "placeholder"
          NOTARIZE_ISSUER_ID: "placeholder"

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -run='^$' ./internal/task/ ./internal/ratelimit/ ./internal/engine/ | tee bench.txt

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: bench-results
          path: bench.txt
          if-no-files-found: ignore

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz config loader
        run: go test -fuzz=FuzzLoad -fuzztime=30s ./internal/config/

      - name: Fuzz task selector
        run: go test -fuzz=FuzzSelector -fuzztime=30s ./internal/task/

      - name: Fuzz error classifier
        run: go test -fuzz=FuzzClassifyError -fuzztime=30s ./internal/ratelimit/

      - name: Fuzz status code classifier
        run: go test -fuzz=FuzzClassifyStatusCode -fuzztime=30s ./internal/ratelimit/

      - name: Fuzz PCAP writer
        run: go test -fuzz=FuzzWriteRecord -fuzztime=30s ./internal/pcap/

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint manages its own cache

      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Test
        run: gotestsum --junitfile junit.xml -- -race -coverprofile=coverage.txt -covermode=atomic ./...

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: true

      - uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3  # v1.2.1
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          fail_ci_if_error: true

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: go test -race -tags integration -v -coverprofile=integration-coverage.txt -covermode=atomic ./...

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: integration-coverage.txt
          flags: integration
          fail_ci_if_error: true

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7
        with:
          version: "~> v2"
          args: check
        env:
          SKIP_GH_RELEASE: "false"
          GH_PAT: "placeholder"
          AUR_SSH_KEY: "placeholder"
          MACOS_SIGN_P12: "placeholder"
          MACOS_SIGN_PASSWORD: "placeholder"
          NOTARIZE_KEY: "placeholder"
          NOTARIZE_KEY_ID: "placeholder"
          NOTARIZE_ISSUER_ID: "placeholder"

  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: changes
        with:
          filters: |
            goreleaser:
              - '.goreleaser.yaml'
              - '.github/workflows/release*.yml'

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        if: steps.changes.outputs.goreleaser == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7
        if: steps.changes.outputs.goreleaser == 'true'
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_GH_RELEASE: "false"
          GH_PAT: "placeholder"
          AUR_SSH_KEY: "placeholder"
          MACOS_SIGN_P12: "placeholder"
          MACOS_SIGN_PASSWORD: "placeholder"
          NOTARIZE_KEY: "placeholder"
          NOTARIZE_KEY_ID: "placeholder"
          NOTARIZE_ISSUER_ID: "placeholder"

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -run='^$' ./internal/task/ ./internal/ratelimit/ ./internal/engine/ | tee bench.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bench-results
          path: bench.txt
          if-no-files-found: ignore

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz config loader
        run: bash scripts/fuzz.sh -fuzz=FuzzLoad -fuzztime=30s ./internal/config/

      - name: Fuzz task selector
        run: bash scripts/fuzz.sh -fuzz=FuzzSelector -fuzztime=30s ./internal/task/

      - name: Fuzz error classifier
        run: bash scripts/fuzz.sh -fuzz=FuzzClassifyError -fuzztime=30s ./internal/ratelimit/

      - name: Fuzz status code classifier
        run: bash scripts/fuzz.sh -fuzz=FuzzClassifyStatusCode -fuzztime=30s ./internal/ratelimit/

      - name: Fuzz PCAP writer
        run: bash scripts/fuzz.sh -fuzz=FuzzWriteRecord -fuzztime=30s ./internal/pcap/

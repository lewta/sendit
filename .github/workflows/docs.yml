name: Docs

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  pull_request:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f  # v3
        with:
          hugo-version: "0.147.1"
          extended: true

      - name: Verify Hugo modules
        run: hugo mod verify
        working-directory: docs

      - name: Build
        run: hugo --minify --baseURL "https://lewta.github.io/sendit/"
        working-directory: docs

      # upload-pages-artifact hard-codes --exclude='.*' which silently drops
      # .well-known/. Build the tar manually so dotfiles are included, then
      # upload with the artifact name deploy-pages expects ("github-pages").
      - name: Create Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          tar \
            --dereference --hard-dereference \
            --directory docs/public \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

name: Update taps

# Triggered automatically after the Release workflow completes successfully.
# Can also be triggered manually to push a formula/manifest for an existing
# release without re-tagging (e.g. after fixing the workflow itself).
# This job runs with a short-lived GitHub App token scoped only to
# lewta/homebrew-tap and lewta/scoop-bucket — the build job above never sees
# those credentials.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to push formula/manifest for (e.g. v0.10.0)"
        required: true

permissions:
  contents: write

jobs:
  update-taps:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || format('refs/tags/{0}', inputs.tag) }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Get release tag
        id: tag
        run: echo "value=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      # Mint a short-lived token (expires in 1 h) scoped to only the two repos
      # that need to be updated. Requires a GitHub App installed on the lewta
      # account with Contents: Read and write on homebrew-tap and scoop-bucket.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homebrew-tap,scoop-bucket

      # The tag commit may predate fixes to .goreleaser.yaml. Overlay the
      # current config from main so we always use the latest pipeline config
      # while keeping all source files at the tag commit (CGO_ENABLED=0 +
      # -trimpath makes Go builds deterministic, so SHA256 still matches).
      - name: Use current GoReleaser config from main
        run: git show origin/main:.goreleaser.yaml > .goreleaser.yaml

      # Rebuilds binaries and archives from scratch (CGO_ENABLED=0 + -trimpath
      # makes Go builds deterministic, so SHA256 matches what was uploaded).
      # SKIP_GH_RELEASE=true sets release.skip_upload=true + mode=keep-existing
      # in .goreleaser.yaml: GoReleaser reads the existing release for URL
      # computation and PATCHes its metadata (requires contents: write), but
      # does NOT re-upload any artifacts.
      - name: Push Homebrew formula and Scoop manifest
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --skip=validate,nfpm,announce,sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ steps.app-token.outputs.token }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.value }}
          SKIP_GH_RELEASE: "true"
